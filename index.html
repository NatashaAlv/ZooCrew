<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Zoo Crew</title>

<link rel="stylesheet" href="style.css">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
  }
}
</script>
<script type="module" src="sketch.js"></script>
</head>

<body>

  <header>
    <div class="container" id="anml">
      <nav>
        <div id="title">Zoo Crew</div>
        
        <button id="giraffeButton">Giraffe</button>
        <button id="sharkButton">Shark</button>
        <button id="monkeyButton">Monkey</button>
        <button id="flamingoButton">Flamingo</button>
        <button id="lionButton">Lion</button>
      </nav>
    </div>
  </header>

  <section>
    <div class="container" id="left">
      <div id="base">
        <div id="subtitle">Colour</div>
        
        <input type="color" id="furColor" value="#00ffff">
      </div>

      <div id="tms">
        <div id="subtitle">Items</div>

        <div id="itemsContainer">
          <button id="maceButton">Mace</button>
          <button id="pepsiButton">Pepsi</button>
        </div>
      </div>

      <div id="accssr">
        <div id="subtitle">Faces</div>
        <div id="facesContainer">
          <button id="face1Button">Face 1</button>
          <button id="face2Button">Face 2</button>
          <button id="face3Button">Face 3</button>
          <button id="face4Button">Face 4</button>
          <button id="face5Button">Face 5</button>
        </div>
      </div>
      
    </div>
  </section>

  <footer>
    <div class="container" id="scale">
      <div id="label">Scale</div>

      <input type="range" id="sizeSlider" min="0.5" max="3" step="0.1" value="1">
    </div>
  </footer>

<script src="sketch.js"></script>

</body>
</html>
