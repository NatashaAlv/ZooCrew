<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Zoo Crew</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>
</head>

<body>

  <header>
    <div class="container" id="anml">
      <nav>
        <div id="label">Animal</div>
        
        <button id="catButton">Cat</button>
        <button id="sharkButton">Shark</button>
      </nav>
    </div>
  </header>

  <section>
    <div class="container" id="left">
      <div id="title">Character Creator</div>

      <div id="base">
        <button class="tab" id="clr">Color</button>
        
        <input type="color" id="furColor" value="#00ffff">
      </div>

      <div id="accssr">
        <button class="tab" id="fc">Face</button>
      </div>
      
    </div>
  </section>

  <footer>
    <div class="container" id="scale">
      <div id="label">Size</div>

      <input type="range" id="sizeSlider" min="0.5" max="3" step="0.1" value="1">
    </div>
  </footer>

<script src="sketch.js"></script>

</body>
</html>
